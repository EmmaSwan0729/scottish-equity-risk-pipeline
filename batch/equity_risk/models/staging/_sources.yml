version: 2

sources:
  - name: raw
    database: EQUITY_DB
    schema: RAW
    tables:
    - name: raw_stock_prices
      columns:
        - name: date
          tests:
            - not_null
        - name: symbol
          tests:
            - not_null
        - name: close
          tests:
            - not_null
            - dbt_utils.expression_is_true:
                arguments:
                  expression: ">= 0"
  - name: alerts
    database: EQUITY_DB
    schema: ALERTS
    tables:
      - name: risk_alerts
        columns:
          - name: alert_type
            tests:
              - accepted_values:
                  arguments:
                    values: 
                      - HIGH_VOLATILITY
                      - PRICE_DROP
                      - PRICE_ANOMALY
          - name: symbol
            tests:
              - not_null
          - name: triggered_at
            tests:
              - not_null