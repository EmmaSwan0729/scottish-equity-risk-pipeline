# Scottish Equity Risk Pipeline — Streaming Infrastructure
#Services: Zookeeper + Kafka Broker + Kafka UI + Spark Master + Spark Worker

# Start command：docker-compose -f docker-compose.yml up -d
# Stop command: docker-compose -f docker-compose.yml down
# View log: docker-compose -f docker-compose.yml logs -f

services:
  # ZOOKEEPER
  # Coordinate the Kafka broker -manage leader election and cluster metadata
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: equity_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
        test: ["CMD", "nc", "-z", "localhost", "2181"]
        interval: 10s
        timeout: 5s
        retries: 5
    networks:
      - equity_network

  # KAFKA BROKER
  # Receives stock price events from kafka_producer.py
  # Internal listener (port 29092) is used by other containers
  # external listener (port 9092) is used by local scripts on the host machine
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: equity_kafka
    depends_on:
      zookeeper:
        condition: service_healthy

    ports:
      - "9092:9092"

    environment:
      KAFKA_BROKER_ID: 1

      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # two listeners: one for inter-container traffic, one for localhost access
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      #Topic defaults - 3 partitions to allow parallel consumption
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3

      KAFKA_DEFAULT_REPLICATION_FACTOR: 1

      # Retain messages for 24 hours or up to 1 GB, whichever coms first
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_RETENTION_BYTES: 1073741824

      #Required for single-broker setup (no replication overhead)
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - equity_network

  # Kafka UI 
  # Web interface for browsing topics, messages, and consumer groups
  # Access at: http://localhost:8080
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: equity_kafka_ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: equity_local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - equity_network
  # SPARK MASTER
  # Manages the Spark cluster -assigns tasks to workers
  # Web UI at: http://localhost:8081
  # spark_streaming.py connects to spark: //localhost:7077
  spark-master:
    image: apache/spark:3.5.6
    container_name: equity_spark_master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077" # Spark master port - used by spark_streaming.py
      - "8081:8081" # Spark master web UI
    networks:
      - equity_network

  # SPARK WORKER
  # Executes Spark tasks -reads from Kafka and writes alerts to Snowflake
  # Allocated 2 CPU cores and 2 GB memory (adjust based on local host machine)
  spark-worker:
    image: apache/spark:3.5.6
    container_name: equity_spark_worker
    depends_on:
      - spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2g
    ports:
      - "8082:8082" # Spark worker web UI
    networks:
      - equity_network

# NETWORK
# All services share on bridge network so they can reach each other by name
# e.g. kafka_producer.py uses "kafka:29092", spark uses "kafka:29092"
networks:
  equity_network:
    driver: bridge
    name: equity_network