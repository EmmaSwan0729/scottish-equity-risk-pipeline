# Scottish Equity Risk Pipeline — Kafka 
# Include：Zookeeper + Kafka Broker + Kafka UI
# start command：docker-compose -f docker-compose-kafka.yml up -d

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
        test: ["CMD", "nc", "localhost", "2181"]
        interval: 10s
        timeout: 5s
        retries: 5
    networks:
      - equity_network
    
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: equity_kafka
    depends_on:
      zookeeper:
        condition: service_healthy

    ports:
      - "9092:9092"

    environment:
      KAFKA_BROKER_ID: 1

      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3

      KAFKA_DEFAULT_REPLICATION_FACTOR: 1

      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_RETENTION_BYTES: 1073741824

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - equity_network

  #---Kafka UI for monitoring and managing Kafka clusters
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: equity_kafka_ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: equity_local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - equity_network

networks:
  equity_network:
    driver: bridge
    name: equity_network
    